<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Collin Wallace — Coming soon</title>
<meta name="description" content="Collin Wallace — writer, investor, entrepreneur, and Stanford University lecturer. Site coming soon." />
<meta name="robots" content="noindex,nofollow" />
<meta name="theme-color" content="#F5EFE4" />
<meta property="og:type" content="website" />
<meta property="og:title" content="Collin Wallace" />
<meta property="og:description" content="Site coming soon." />
<meta property="og:url" content="https://collinwallace.com/" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23F5EFE4'/%3E%3Ccircle cx='16' cy='16' r='7' fill='%23B8583A'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" />
<style>
  :root{
    --bg:#F5EFE4;
    --ink:#1F1B17;
    --ink-3:#6B6560;
    --accent:#B8583A;
    --accent-ink:#8A3E27;
    --rule:#E0D6C2;
    --serif:"Source Serif 4", Georgia, serif;
    --sans:"Inter", system-ui, -apple-system, sans-serif;
    --mono:"JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    font-size:17px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    min-height:100svh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px;
  }
  ::selection{background:var(--accent); color:var(--bg);}
  main{
    max-width:560px;
    width:100%;
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-3);
    font-weight:500;
    margin:0 0 28px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .eyebrow::before{
    content:"";
    display:inline-block;
    width:8px; height:8px;
    background:var(--accent);
    border-radius:999px;
    box-shadow:0 0 0 4px rgba(184,88,58,0.14);
  }
  h1{
    font-family:var(--serif);
    font-weight:400;
    font-size:clamp(40px, 6.4vw, 68px);
    line-height:1.04;
    letter-spacing:-0.02em;
    margin:0 0 24px;
    color:var(--ink);
  }
  h1 em{
    font-style:italic;
    color:var(--accent-ink);
    font-weight:400;
  }
  p.lede{
    font-family:var(--serif);
    font-weight:300;
    font-size:clamp(18px, 2.2vw, 22px);
    line-height:1.5;
    color:var(--ink);
    margin:0 0 32px;
    max-width:480px;
  }
  hr{
    border:0;
    height:1px;
    background:var(--rule);
    margin:32px 0;
  }
  .contact{
    font-family:var(--sans);
    font-size:15.5px;
    color:var(--ink-3);
    margin:0;
  }
  .contact a{
    color:var(--ink);
    text-decoration:none;
    border-bottom:1px solid var(--accent);
    transition:color 0.2s ease;
  }
  .contact a:hover{
    color:var(--accent-ink);
  }
  footer{
    margin-top:48px;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--ink-3);
  }
</style>
</head>
<body>
<main>
  <p class="eyebrow">Collin Wallace</p>
  <h1>Something <em>perishable</em> is in the works.</h1>
  <p class="lede">A new site is under construction. Come back soon.</p>
  <hr />
  <p class="contact">In the meantime &mdash; <a href="mailto:collin@lifemademobile.com">collin@lifemademobile.com</a>.</p>
  <footer>&copy; 2026 Wallace Industries LLC</footer>
</main>
</body>
</html>
